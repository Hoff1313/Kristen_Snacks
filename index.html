<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disney Snack Tracker</title>

  <!-- ✅ Correct stylesheet link -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Disney Snack Tracker</h1>

<div class="filters">

  <!-- ✅ PARK BUTTONS -->
  <div id="park-group" class="filter-group">
    <button id="park-all" onclick="setPark('all')">All</button>
    <button id="park-Magic Kingdom" onclick="setPark('Magic Kingdom')">Magic Kingdom</button>
    <button id="park-EPCOT" onclick="setPark('EPCOT')">EPCOT</button>
    <button id="park-Hollywood Studios" onclick="setPark('Hollywood Studios')">Hollywood</button>
    <button id="park-Animal Kingdom" onclick="setPark('Animal Kingdom')">Animal Kingdom</button>
    <button id="park-Disney Springs" onclick="setPark('Disney Springs')">Disney Springs</button>
    <button id="park-Resort" onclick="setPark('Resort')">Resorts</button>
  </div>

  <!-- ✅ TRIED FILTER BUTTONS -->
  <div id="tried-group" class="filter-group">
    <button id="tried-all" onclick="setTried('all')">All</button>
    <button id="tried-true" onclick="setTried(true)">Tried ✅</button>
